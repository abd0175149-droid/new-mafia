# ══════════════════════════════════════════════════════
# 🎭 Unified Mafia Platform — Production Docker Compose
# ══════════════════════════════════════════════════════

services:
  # ── Nginx Reverse Proxy ────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "3010:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - mafia-net

  # ── Backend (Express + Socket.IO) ───────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://mafia_user:${DB_PASSWORD:-mafia_pass}@postgres:5432/mafia_db
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - FRONTEND_URL=${FRONTEND_URL:-https://mafia.grade.sbs}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - mafia-net

  # ── Frontend (Next.js) ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - BACKEND_URL=http://backend:4000
      - HOSTNAME=0.0.0.0
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - mafia-net

  # ── PostgreSQL (Unified Database) ──────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=mafia_user
      - POSTGRES_PASSWORD=${DB_PASSWORD:-mafia_pass}
      - POSTGRES_DB=mafia_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mafia_user -d mafia_db"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - mafia-net

  # ── Redis (Live Game State) ────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - mafia-net

volumes:
  postgres_data:
  redis_data:

networks:
  mafia-net:
    driver: bridge
