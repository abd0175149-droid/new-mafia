version: '3.8'

services:
  database:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: mafia_user
      POSTGRES_PASSWORD: mafia_pass
      POSTGRES_DB: ${DB_NAME}
    # 🔒 ربط المنفذ بالمضيف المحلي فقط (يمنع الوصول الخارجي المباشر لقاعدة البيانات)
    ports:
      - "127.0.0.1:${DB_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    restart: always
    # 🔒 ربط المنفذ بالمضيف المحلي فقط (Redis بلا كلمة سر — يجب ألا يُكشف خارجياً)
    ports:
      - "127.0.0.1:${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - PORT=${BACKEND_PORT}
      - DATABASE_URL=postgresql://mafia_user:mafia_pass@database:5432/${DB_NAME}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-mafia_secret_key_123}
      # مفاتيح VAPID لـ Web Push (iOS/Safari). إن لم تُمرَّر فسيولّدها الباكند ويحفظها
      # داخل volume الـ uploads ليبقى الزوج ثابتاً بين عمليات إعادة التشغيل.
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      # 🔒 الرقم السرّي لفتح الأدوات الحسّاسة (تعديل الأرقام/الأسماء). يُضبط في .env على الخادم — لا يُكتب هنا.
      - RENUMBER_SECRET=${RENUMBER_SECRET:-}
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    depends_on:
      - database
      - redis
    volumes:
      - uploads_data:/app/uploads
      - ./google-service-account.json:/app/google-service-account.json
      # بيانات اعتماد Firebase Admin (لإرسال FCM للأندرويد/كروم). الملف سرّي وخارج git؛
      # يُوضع يدوياً على السيرفر في backend/firebase-service-account.json ويُركّب للقراءة فقط.
      - ./backend/firebase-service-account.json:/app/firebase-service-account.json:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - BACKEND_URL=http://backend:${BACKEND_PORT}
    restart: always
    environment:
      - PORT=${FRONTEND_PORT}
      - BACKEND_URL=http://backend:${BACKEND_PORT}
      - HOSTNAME=0.0.0.0
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    depends_on:
      - backend


volumes:
  db_data:
  redis_data:
  uploads_data:
