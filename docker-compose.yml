version: '3.8'

services:
  database:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: mafia_user
      POSTGRES_PASSWORD: mafia_pass
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - PORT=${BACKEND_PORT}
      - DATABASE_URL=postgresql://mafia_user:mafia_pass@database:5432/${DB_NAME}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-mafia_secret_key_123}
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    depends_on:
      - database
      - redis
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    environment:
      - PORT=${FRONTEND_PORT}
      - BACKEND_URL=http://backend:${BACKEND_PORT}
      - HOSTNAME=0.0.0.0
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    depends_on:
      - backend

volumes:
  db_data:
  redis_data:
  uploads_data:
